name: iOS Build

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [dev, master]
    paths:
      - 'client/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'ios/**'
      - '.github/workflows/ios.yml'

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build
        env:
          VITE_TURNSTILE_SITE_KEY: '0x4AAAAAADm4HnOK8P1JV2Ss'

      - name: Capacitor sync iOS
        run: npx cap sync ios

      - name: Resolve SPM packages
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App

      - name: Download iOS platform
        run: xcodebuild -downloadPlatform iOS

      - name: Build iOS (unsigned archive)
        run: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "${{ github.workspace }}/build/App.xcarchive" \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Generate IPA
        run: |
          mkdir -p "${{ github.workspace }}/build/Payload"
          cp -R "${{ github.workspace }}/build/App.xcarchive/Products/Applications/"*.app "${{ github.workspace }}/build/Payload/"
          cd "${{ github.workspace }}/build"
          zip -r BJJRats.ipa Payload/

      - name: Upload IPA (artefato)
        uses: actions/upload-artifact@v4
        with:
          name: BJJRats-iOS-unsigned
          path: build/BJJRats.ipa
          retention-days: 7
