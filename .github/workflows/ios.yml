name: iOS Build

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [dev, master]
    paths:
      - 'client/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'ios/**'
      - '.github/workflows/ios.yml'

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          echo "Available Xcode apps:"
          ls -1 /Applications | grep '^Xcode' || true

          XCODE_DEVELOPER_DIR=""
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DEVELOPER_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_DEVELOPER_DIR="$(ls -d /Applications/Xcode_16*.app/Contents/Developer 2>/dev/null | sort | tail -n 1 || true)"
          fi

          if [ -z "$XCODE_DEVELOPER_DIR" ]; then
            echo "No compatible Xcode installation found."
            exit 1
          fi

          sudo xcode-select -s "$XCODE_DEVELOPER_DIR"
          xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build
        env:
          VITE_TURNSTILE_SITE_KEY: '0x4AAAAAADm4HnOK8P1JV2Ss'

      - name: Capacitor sync iOS
        run: npx cap sync ios

      - name: Prepare iOS platform
        timeout-minutes: 30
        run: |
          set -euo pipefail
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          xcrun --sdk iphoneos --show-sdk-path
          xcodebuild -showsdks

      - name: Resolve SPM packages
        run: |
          cd ios/App
          xcodebuild \
            -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App \
            -destination 'generic/platform=iOS'

      - name: Build iOS (unsigned archive)
        run: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "${{ github.workspace }}/build/App.xcarchive" \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Generate IPA
        run: |
          mkdir -p "${{ github.workspace }}/build/Payload"
          cp -R "${{ github.workspace }}/build/App.xcarchive/Products/Applications/"*.app "${{ github.workspace }}/build/Payload/"
          cd "${{ github.workspace }}/build"
          zip -r BJJRats.ipa Payload/

      - name: Upload IPA (artefato)
        uses: actions/upload-artifact@v4
        with:
          name: BJJRats-iOS-unsigned
          path: build/BJJRats.ipa
          retention-days: 7
