# Nome da aplicação — troque para o nome que você escolher no Fly.io
app = "bjjrats"
primary_region = "gru"  # São Paulo (mais próximo do Brasil)

[build]
  [build.args]
    VITE_TURNSTILE_SITE_KEY = "0x4AAAAAADm4HnOK8P1JV2Ss"

[env]
  NODE_ENV = "production"
  PORT     = "3000"
  # CORS_ORIGIN e UPLOADS_DIR são configurados via: fly secrets set ...
  UPLOADS_DIR = "/app/uploads"

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1

# Volume persistente para uploads de arquivos (fotos de comprovantes, etc.)
[[mounts]]
  source      = "bjjrats_uploads"
  destination = "/app/uploads"
  initial_size = "1gb"
